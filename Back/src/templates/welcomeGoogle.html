<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to FortCode</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #020617;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            color: #f1f5f9;
        }

        .wrapper {
            width: 100%;
            background-color: #020617;
            padding: 40px 0;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background-color: #0f172a;
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 32px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .user-greeting {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .accent {
            color: #fbbf24;
        }

        .button-container {
            margin: 40px 0;
            display: inline-block;
        }

        .platform-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.1) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 16px 36px;
            color: #ffffff;
            font-weight: 600;
            text-decoration: none;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            font-size: 16px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(51, 65, 85, 0.5);
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .footer-brand {
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="card">
                <div class="content">
                    <img src="cid:logo" alt="FortCode Logo" class="logo">
                    <h1>Google Sign-In Confirmed</h1>
                    <div class="user-greeting">Welcome <span class="accent">{{username}}</span>,</div>
                    <p class="subtitle">Your FortCode account has been successfully linked to your Google Account. You
                        are now securely logged in.</p>

                    <div class="footer">
                        <div class="footer-brand">FortCode Security</div>
                        Advanced Digital Engineering & Mastery<br>
                        &copy; 2024 FortCode Ecosystem. All rights reserved.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
